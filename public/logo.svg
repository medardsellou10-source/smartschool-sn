<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Fond dégradé principal -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1B4B;stop-opacity:1" />
    </linearGradient>
    <!-- Dégradé cyan néon -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B0FF;stop-opacity:1" />
    </linearGradient>
    <!-- Dégradé vert succès -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E676;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C853;stop-opacity:1" />
    </linearGradient>
    <!-- Dégradé or -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6D00;stop-opacity:1" />
    </linearGradient>
    <!-- Filtre lueur cyan -->
    <filter id="glowCyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowGold" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Ombre douce -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00E5FF" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Fond arrondi -->
  <rect width="200" height="200" rx="36" ry="36" fill="url(#bgGrad)"/>

  <!-- Bordure lumineuse subtile -->
  <rect width="200" height="200" rx="36" ry="36" fill="none" stroke="url(#cyanGrad)" stroke-width="1.5" opacity="0.4"/>

  <!-- Arc de diplôme / toit d'école — base arrondie en haut -->
  <path d="M 100 28 L 168 68 L 168 72 L 100 112 L 32 72 L 32 68 Z"
    fill="url(#cyanGrad)" opacity="0.15" filter="url(#glowCyan)"/>

  <!-- Toit de l'école — triangle lumineux -->
  <polygon points="100,26 170,70 30,70"
    fill="none" stroke="url(#cyanGrad)" stroke-width="2.5" stroke-linejoin="round"
    filter="url(#glowCyan)"/>

  <!-- Corps du bâtiment école -->
  <rect x="48" y="70" width="104" height="62" rx="4"
    fill="none" stroke="url(#cyanGrad)" stroke-width="2" opacity="0.8"/>

  <!-- Remplissage translucide bâtiment -->
  <rect x="48" y="70" width="104" height="62" rx="4"
    fill="url(#cyanGrad)" opacity="0.07"/>

  <!-- Porte centrale -->
  <rect x="86" y="102" width="28" height="30" rx="4"
    fill="url(#cyanGrad)" opacity="0.35"/>
  <rect x="86" y="102" width="28" height="30" rx="4"
    fill="none" stroke="url(#cyanGrad)" stroke-width="1.5"/>

  <!-- Fenêtre gauche -->
  <rect x="60" y="82" width="20" height="16" rx="3"
    fill="url(#cyanGrad)" opacity="0.25"/>
  <rect x="60" y="82" width="20" height="16" rx="3"
    fill="none" stroke="url(#cyanGrad)" stroke-width="1.2"/>

  <!-- Fenêtre droite -->
  <rect x="120" y="82" width="20" height="16" rx="3"
    fill="url(#cyanGrad)" opacity="0.25"/>
  <rect x="120" y="82" width="20" height="16" rx="3"
    fill="none" stroke="url(#cyanGrad)" stroke-width="1.2"/>

  <!-- Point central sommet toit (étoile / flambeau) -->
  <circle cx="100" cy="24" r="5" fill="url(#goldGrad)" filter="url(#glowGold)"/>
  <line x1="100" y1="14" x2="100" y2="18" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="90" y1="18" x2="93" y2="21" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="110" y1="18" x2="107" y2="21" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round"/>

  <!-- Icône IA — circuit dans le bâtiment (petits points connectés) -->
  <circle cx="75" cy="96" r="2.5" fill="url(#greenGrad)" opacity="0.9"/>
  <circle cx="100" cy="92" r="2.5" fill="url(#greenGrad)" opacity="0.9"/>
  <circle cx="125" cy="96" r="2.5" fill="url(#greenGrad)" opacity="0.9"/>
  <line x1="75" y1="96" x2="100" y2="92" stroke="url(#greenGrad)" stroke-width="1" opacity="0.7"/>
  <line x1="100" y1="92" x2="125" y2="96" stroke="url(#greenGrad)" stroke-width="1" opacity="0.7"/>

  <!-- Texte "SS" central en haut de la porte -->
  <text x="100" y="122" text-anchor="middle" dominant-baseline="middle"
    font-family="'Arial', sans-serif" font-weight="900" font-size="13"
    fill="url(#cyanGrad)" filter="url(#glowCyan)" letter-spacing="1">SN</text>

  <!-- Ligne dégradée séparatrice -->
  <rect x="30" y="140" width="140" height="2" rx="1" fill="url(#goldGrad)" opacity="0.6"/>

  <!-- Texte SmartSchool -->
  <text x="100" y="157" text-anchor="middle" dominant-baseline="middle"
    font-family="'Arial', sans-serif" font-weight="900" font-size="16"
    fill="url(#cyanGrad)" filter="url(#glowCyan)" letter-spacing="2">SmartSchool</text>

  <!-- Texte SN + tagline -->
  <text x="100" y="175" text-anchor="middle" dominant-baseline="middle"
    font-family="'Arial', sans-serif" font-weight="600" font-size="9"
    fill="url(#goldGrad)" letter-spacing="3">SÉNÉGAL · ÉDUCATION · IA</text>

  <!-- Points décoratifs néon coins -->
  <circle cx="20" cy="20" r="2" fill="url(#cyanGrad)" opacity="0.3"/>
  <circle cx="180" cy="20" r="2" fill="url(#cyanGrad)" opacity="0.3"/>
  <circle cx="20" cy="180" r="2" fill="url(#cyanGrad)" opacity="0.3"/>
  <circle cx="180" cy="180" r="2" fill="url(#cyanGrad)" opacity="0.3"/>
</svg>

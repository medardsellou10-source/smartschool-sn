<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E27"/>
      <stop offset="100%" style="stop-color:#0D1B4B"/>
    </linearGradient>
    <linearGradient id="c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF"/>
      <stop offset="100%" style="stop-color:#00B0FF"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD600"/>
      <stop offset="100%" style="stop-color:#FF6D00"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <rect width="32" height="32" rx="6" fill="none" stroke="url(#c)" stroke-width="0.8" opacity="0.5"/>
  <!-- Toit -->
  <polygon points="16,4 27,11 5,11" fill="none" stroke="url(#c)" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Corps bâtiment -->
  <rect x="7" y="11" width="18" height="11" rx="1" fill="none" stroke="url(#c)" stroke-width="1.2"/>
  <!-- Porte -->
  <rect x="13" y="17" width="6" height="5" rx="1" fill="url(#c)" opacity="0.4"/>
  <!-- Fenêtres -->
  <rect x="9" y="13.5" width="4" height="3" rx="0.8" fill="url(#c)" opacity="0.3"/>
  <rect x="19" y="13.5" width="4" height="3" rx="0.8" fill="url(#c)" opacity="0.3"/>
  <!-- Étoile sommet -->
  <circle cx="16" cy="3.5" r="1.5" fill="url(#g)"/>
  <!-- Ligne or -->
  <rect x="4" y="23.5" width="24" height="1" rx="0.5" fill="url(#g)" opacity="0.7"/>
  <!-- Texte SS -->
  <text x="16" y="30.5" text-anchor="middle" dominant-baseline="middle"
    font-family="Arial" font-weight="900" font-size="5.5"
    fill="#00E5FF" letter-spacing="1">SS</text>
</svg>